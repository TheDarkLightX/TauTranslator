[mutmut]
paths_to_mutate = src/tau_translator_omega/core_engine/ast/ast_nodes.py
backup = False
runner = PYTHONPATH=src python -m pytest tests/core_engine/ast_tests/ -x --tb=no --disable-warnings
tests_dir = tests/core_engine/ast_tests/

[coverage:run]
source = src
omit = 
    */tests/*
    */test_*.py
    */__init__.py
    */conftest.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING: