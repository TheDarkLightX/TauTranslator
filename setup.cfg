[mutmut]
paths_to_mutate = backend/unified/api/llm_endpoints.py
backup = False
runner = PYTHONPATH=. pytest -c /dev/null -q tests/unit/test_api_llm_chat_contract.py tests/unit/test_api_llm_endpoints_contract.py tests/unit/test_tce_endpoints_contract.py tests/unit/test_server_misc_endpoints.py tests/unit/test_llm_providers_openrouter.py
tests_dir = tests/mutmut_subset/

[coverage:run]
source = src
omit = 
    */tests/*
    */test_*.py
    */__init__.py
    */conftest.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING: