site_name: Tau Translator
site_url: https://www.tautranslator.ai/
repo_url: https://github.com/your-org/TauTranslatorOmega
repo_name: TauTranslatorOmega
nav:
  - Home: home.md
  - Whitepaper: WHITEPAPER.html
  - Translator:
      - Current (CodeMirror 6): translator_cm.html
      - Classic (Monaco): translator.html
      - Lab (CodeMirror 6): translator_lab.html
  - TCE: tce.md
  - Architecture:
      - Translation Pipeline: architecture/translation_pipeline.md
      - Grammar Engine: architecture/grammar_engine.md
      - Mechanism Design (Internal): architecture/mechanism_design.md
  - API Reference: reference/index.md
  - Intent Detection & Analysis: intent_lattices.html
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.instant
    - search.highlight
markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
plugins:
  - search
