site_name: Tau Translator
site_url: https://www.tautranslator.ai/
repo_url: https://github.com/your-org/TauTranslatorOmega
repo_name: TauTranslatorOmega
nav:
  - Home: home.md
  - Translator: translator.html
  - Architecture:
      - Translation Pipeline: architecture/translation_pipeline.md
      - Grammar Engine: architecture/grammar_engine.md
  - API Reference: reference/index.md
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.instant
    - search.highlight
markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
plugins:
  - search
