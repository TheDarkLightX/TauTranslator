<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TauTranslatorOmega - Bidirectional Tau ↔ TCE Translation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .status {
            background: #27ae60;
            color: white;
            padding: 10px;
            text-align: center;
            font-weight: bold;
        }
        
        .main-content {
            padding: 40px;
        }
        
        .translation-area {
            display: grid;
            grid-template-columns: 1fr 100px 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .input-section, .output-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            border: 2px solid #e9ecef;
        }
        
        .input-section h3, .output-section h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }
        
        .direction-controls {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        
        .direction-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.2em;
            transition: all 0.3s ease;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .direction-btn:hover {
            background: #2980b9;
            transform: scale(1.1);
        }
        
        .direction-btn.active {
            background: #e74c3c;
        }
        
        textarea {
            width: 100%;
            height: 200px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
        }
        
        .translate-btn {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin: 20px auto;
        }
        
        .translate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }
        
        .result-info {
            background: #ecf0f1;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            font-size: 0.9em;
        }
        
        .examples {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
        }
        
        .example-item {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #3498db;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .example-item:hover {
            transform: translateX(5px);
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        
        .example-tau {
            font-family: 'Courier New', monospace;
            background: #2c3e50;
            color: #ecf0f1;
            padding: 8px 12px;
            border-radius: 4px;
            margin: 5px 0;
        }
        
        .example-tce {
            font-style: italic;
            color: #27ae60;
            margin: 5px 0;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #e74c3c;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        
        .success {
            background: #27ae60;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌍 TauTranslatorOmega</h1>
            <p>Bidirectional Translation between Tau Language and Tau Controlled English</p>
        </div>
        
        <div class="status">
            {% if lmql_available %}
                🚀 LMQL Enhanced Translation Active
            {% else %}
                🔧 Pattern-Based Translation (LMQL Fallback)
            {% endif %}
        </div>
        
        <div class="main-content">
            <div class="translation-area">
                <div class="input-section">
                    <h3 id="input-title">📝 Tau Language Input</h3>
                    <textarea id="input-text" placeholder="Enter Tau Language code here...
Example: halfAdderSum(a, b) := a + b"></textarea>
                    <div class="result-info" id="input-info" style="display: none;"></div>
                </div>
                
                <div class="direction-controls">
                    <button class="direction-btn active" id="tau-to-tce" onclick="setDirection('tau_to_tce')">
                        →
                    </button>
                    <button class="direction-btn" id="tce-to-tau" onclick="setDirection('tce_to_tau')">
                        ←
                    </button>
                </div>
                
                <div class="output-section">
                    <h3 id="output-title">🗣️ TCE Output</h3>
                    <textarea id="output-text" readonly placeholder="Translation will appear here..."></textarea>
                    <div class="result-info" id="output-info" style="display: none;"></div>
                </div>
            </div>
            
            <button class="translate-btn" onclick="translate()">🔄 Translate</button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Translating...</p>
            </div>
            
            <div class="examples">
                <h3>📚 Example Translations</h3>
                <div id="examples-container">
                    <!-- Examples will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentDirection = 'tau_to_tce';
        
        function setDirection(direction) {
            currentDirection = direction;
            
            // Update button states
            document.getElementById('tau-to-tce').classList.toggle('active', direction === 'tau_to_tce');
            document.getElementById('tce-to-tau').classList.toggle('active', direction === 'tce_to_tau');
            
            // Update labels
            if (direction === 'tau_to_tce') {
                document.getElementById('input-title').textContent = '📝 Tau Language Input';
                document.getElementById('output-title').textContent = '🗣️ TCE Output';
                document.getElementById('input-text').placeholder = 'Enter Tau Language code here...\nExample: halfAdderSum(a, b) := a + b';
            } else {
                document.getElementById('input-title').textContent = '🗣️ TCE Input';
                document.getElementById('output-title').textContent = '📝 Tau Language Output';
                document.getElementById('input-text').placeholder = 'Enter TCE description here...\nExample: Define function halfAdderSum as a plus b.';
            }
            
            // Clear previous results
            document.getElementById('output-text').value = '';
            document.getElementById('input-info').style.display = 'none';
            document.getElementById('output-info').style.display = 'none';
        }
        
        async function translate() {
            const inputText = document.getElementById('input-text').value.trim();
            
            if (!inputText) {
                alert('Please enter some text to translate.');
                return;
            }
            
            // Show loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('output-text').value = '';
            document.getElementById('output-info').style.display = 'none';
            
            try {
                const response = await fetch('/translate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        text: inputText,
                        direction: currentDirection
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('output-text').value = result.output;
                    
                    // Show result info
                    const info = document.getElementById('output-info');
                    info.innerHTML = `
                        <div class="success">✅ Translation successful!</div>
                        <strong>Confidence:</strong> ${(result.confidence * 100).toFixed(1)}%<br>
                        <strong>Patterns detected:</strong> ${result.patterns_detected.join(', ')}<br>
                        ${result.warnings.length > 0 ? '<strong>Warnings:</strong> ' + result.warnings.join(', ') : ''}
                    `;
                    info.style.display = 'block';
                } else {
                    document.getElementById('output-text').value = 'Translation failed.';
                    
                    const info = document.getElementById('output-info');
                    info.innerHTML = `<div class="error">❌ ${result.error || result.errors.join(', ')}</div>`;
                    info.style.display = 'block';
                }
            } catch (error) {
                document.getElementById('output-text').value = 'Error occurred during translation.';
                
                const info = document.getElementById('output-info');
                info.innerHTML = `<div class="error">❌ Network error: ${error.message}</div>`;
                info.style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        function loadExample(tau, tce) {
            if (currentDirection === 'tau_to_tce') {
                document.getElementById('input-text').value = tau;
                document.getElementById('output-text').value = tce;
            } else {
                document.getElementById('input-text').value = tce;
                document.getElementById('output-text').value = tau;
            }
        }
        
        // Load examples on page load
        async function loadExamples() {
            try {
                const response = await fetch('/examples');
                const data = await response.json();
                
                const container = document.getElementById('examples-container');
                container.innerHTML = data.examples.map(example => `
                    <div class="example-item" onclick="loadExample('${example.tau}', '${example.tce}')">
                        <div><strong>${example.description}</strong></div>
                        <div class="example-tau">${example.tau}</div>
                        <div class="example-tce">${example.tce}</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Failed to load examples:', error);
            }
        }
        
        // Initialize
        loadExamples();
        
        // Allow Enter key to translate
        document.getElementById('input-text').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                translate();
            }
        });
    </script>
</body>
</html>
