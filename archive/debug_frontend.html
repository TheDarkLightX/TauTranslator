<!DOCTYPE html>
<html>
<head>
    <title>Debug Tau Translator</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .panels { display: flex; gap: 20px; margin: 20px 0; }
        .panel { flex: 1; }
        .panel h3 { margin-bottom: 10px; }
        textarea { width: 100%; height: 200px; padding: 10px; }
        .controls { text-align: center; margin: 20px 0; }
        button { padding: 10px 20px; margin: 0 10px; font-size: 16px; }
        .status { margin: 10px 0; padding: 10px; background: #f0f0f0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Debug Tau Translator</h1>
        <div class="status" id="status">Ready</div>
        
        <div class="controls">
            <button onclick="translateTCEToTau()">English → Tau</button>
            <button onclick="translateTauToTCE()">Tau → English</button>
            <button onclick="testBackend()">Test Backend</button>
        </div>
        
        <div class="panels">
            <div class="panel">
                <h3>Input</h3>
                <textarea id="input" placeholder="Enter text here...">Always x and y.</textarea>
            </div>
            <div class="panel">
                <h3>Output</h3>
                <textarea id="output" placeholder="Translation will appear here..." readonly></textarea>
            </div>
        </div>
        
        <div class="status" id="result"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api/translate';
        const BACKEND_URL = 'http://localhost:8003/translate';
        
        function setStatus(message) {
            document.getElementById('status').innerText = message;
        }
        
        function setResult(message) {
            document.getElementById('result').innerText = message;
        }
        
        async function translateTCEToTau() {
            const input = document.getElementById('input').value;
            if (!input.trim()) {
                setStatus('Please enter some text');
                return;
            }
            
            setStatus('Translating English to Tau...');
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        sourceText: input,
                        sourceLangKey: 'PLAIN_ENGLISH',
                        targetLangKey: 'TAU'
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                document.getElementById('output').value = data.translatedText;
                setStatus('Translation completed');
                setResult(`Provider: ${data.provider}, Model: ${data.model}, Time: ${data.processingTime}ms`);
                
            } catch (error) {
                setStatus(`Error: ${error.message}`);
                setResult('Translation failed');
                console.error('Translation error:', error);
            }
        }
        
        async function translateTauToTCE() {
            const input = document.getElementById('input').value;
            if (!input.trim()) {
                setStatus('Please enter some text');
                return;
            }
            
            setStatus('Translating Tau to English...');
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        sourceText: input,
                        sourceLangKey: 'TAU',
                        targetLangKey: 'PLAIN_ENGLISH'
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                document.getElementById('output').value = data.translatedText;
                setStatus('Translation completed');
                setResult(`Provider: ${data.provider}, Model: ${data.model}, Time: ${data.processingTime}ms`);
                
            } catch (error) {
                setStatus(`Error: ${error.message}`);
                setResult('Translation failed');
                console.error('Translation error:', error);
            }
        }
        
        async function testBackend() {
            setStatus('Testing backend connection...');
            
            try {
                // Test direct backend
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        text: 'Always x and y.',
                        direction: 'tce_to_tau'
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`Backend HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                setStatus('Backend connection successful');
                setResult(`Direct backend test: "${data.translatedText}"`);
                
            } catch (error) {
                setStatus(`Backend error: ${error.message}`);
                setResult('Backend connection failed');
                console.error('Backend error:', error);
            }
        }
        
        // Test on page load
        window.addEventListener('load', () => {
            setStatus('Page loaded - ready for testing');
        });
    </script>
</body>
</html>
