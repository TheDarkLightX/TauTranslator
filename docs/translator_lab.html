<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tau Translator — CM6 Lab</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; worker-src 'self' blob:; connect-src 'self' https://tau-translator-api.fly.dev http://127.0.0.1:8010 http://localhost:8010; font-src 'self' data:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" />
  <script src="js/cm6.bundle.js"></script>
  <script type="module">import { cm_slugifyWords, cm_localP2S, cm_localValidate, cm_localS2P, cm_localTce2Tau } from './js/fallbacks.js'; window.cm_slugifyWords=cm_slugifyWords; window.cm_localP2S=cm_localP2S; window.cm_localValidate=cm_localValidate; window.cm_localS2P=cm_localS2P; window.cm_localTce2Tau=cm_localTce2Tau;</script>
  <style>
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
    .wrap { max-width: 1100px; margin: 24px auto; padding: 0 16px; }
    .row { display:grid; grid-template-columns: 1fr 1fr; gap: 14px }
    .card { border:1px solid #e5e7eb; border-radius: 10px; padding: 12px }
    .btn { padding: 8px 10px; border-radius: 10px; border:1px solid #e5e7eb; background: #f8fafc; cursor: pointer; }
    textarea { width:100%; height:42vh }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Translator Lab (CM6)</h1>
    <p>This experimental page defaults to a local Lab API at <code>http://127.0.0.1:8010</code>. Update as needed.</p>
    <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap">
      <label>API <input id="apiBase" style="min-width:320px" /></label>
      <button class="btn" id="saveApi">Save</button>
      <button class="btn" id="pingApi">Ping</button>
      <small id="apiStatus">status: unknown</small>
    </div>
    <div class="card" style="margin:12px 0">
      <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap">
        <button class="btn" id="run">Translate</button>
      </div>
    </div>
    <div class="row">
      <div class="card">
        <label>Input</label>
        <div id="cmIn" style="display:none"></div>
        <textarea id="inFallback">If a payment is approved then the order is shipped.</textarea>
      </div>
      <div class="card">
        <label>Output</label>
        <div id="cmOut" style="display:none"></div>
        <textarea id="outFallback" readonly></textarea>
      </div>
    </div>
    <div class="card" style="margin-top:12px">
      <label>Reasons / Errors</label>
      <div id="reasons" style="font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace; font-size:13px"></div>
    </div>
  </div>
  <script>
    const $ = (id)=>document.getElementById(id);
    function apiBase(){ const v=$('apiBase').value.trim(); return (v||'http://127.0.0.1:8010').replace(/\/$/, ''); }
    // Default to local lab API
    try{ const saved = localStorage.getItem('tau_api_base') || 'http://127.0.0.1:8010'; $('apiBase').value = saved; }catch{ $('apiBase').value = 'http://127.0.0.1:8010'; }
    $('saveApi').onclick = ()=>{ localStorage.setItem('tau_api_base', $('apiBase').value.trim()); alert('Saved'); };
    $('pingApi').onclick = async ()=>{ try{ const r = await fetch(apiBase() + '/'); $('apiStatus').textContent = 'status: ' + (r.ok? 'online' : ('HTTP '+r.status)); }catch(e){ $('apiStatus').textContent = 'status: offline'; } };
    async function post(path, body){ const res = await fetch(apiBase()+path, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)}); if(!res.ok) throw new Error('HTTP '+res.status); return res.json(); }
    function setOutput(text){ try{ const of=$('outFallback'); of.value = text||''; }catch{} }
    function setReasons(lines){ $('reasons').textContent = Array.isArray(lines)&&lines.length ? '- ' + lines.join('\n- ') : ''; }
    $('run').onclick = async ()=>{
      setOutput(''); setReasons([]);
      const input = ($('inFallback')?.value||'').trim(); if(!input){ setReasons(['Enter input']); return; }
      try{
        const r = await post('/llm/prompt-to-spec', { prompt: input, mode:'assist', constraints:{ require_prefix:'always (', require_closing_paren:true, forbid_colon:true } });
        setOutput((r.tau||'') || (r.tce||'') || (r.explanation||''));
        setReasons(r.reasons||[]);
      }catch(e){ setReasons([String(e && e.message || e)]); }
    };
  </script>
</body>
</html>
